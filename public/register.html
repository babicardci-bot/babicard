<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6C63FF">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Babicard">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Créer un compte — Babicard.ci</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <!-- Bouton thème flottant -->
  <button class="theme-toggle theme-toggle-float" id="themeToggle" onclick="toggleTheme()" title="Mode clair / sombre">
    <div class="theme-toggle-knob" id="themeKnob">🌙</div>
  </button>

  <div class="auth-bg">
    <div class="auth-particles"></div>
    <div class="floating-icons">
      <span class="float-icon" style="top:15%;left:6%;animation-delay:0s">🎮</span>
      <span class="float-icon" style="top:25%;right:8%;animation-delay:1s">🕹️</span>
      <span class="float-icon" style="top:65%;left:4%;animation-delay:2s">🏆</span>
      <span class="float-icon" style="top:75%;right:6%;animation-delay:0.5s">🎁</span>
    </div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/">
          <span class="logo-icon">🎮</span>
          <span class="logo-text">Babicard<span class="logo-accent">.ci</span></span>
        </a>
      </div>

      <h1 class="auth-title">Créer un compte</h1>
      <p class="auth-subtitle">Rejoignez des milliers de gamers en Côte d'Ivoire</p>

      <div class="alert-box hidden" id="alertBox"></div>

      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="name">Nom complet</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <input type="text" id="name" name="name" placeholder="Votre nom complet" required autocomplete="name" minlength="2">
          </div>
        </div>

        <div class="form-group">
          <label for="email">Adresse email</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <input type="email" id="email" name="email" placeholder="votre@email.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="phone">Téléphone (pour recevoir vos codes par SMS)</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
            <input type="tel" id="phone" name="phone" placeholder="+225 07 XX XX XX XX" autocomplete="tel">
          </div>
          <small class="input-hint">Format Côte d'Ivoire: +225 07 XX XX XX XX (optionnel mais recommandé)</small>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <input type="password" id="password" name="password" placeholder="Minimum 8 caractères" required autocomplete="new-password" minlength="8" oninput="checkPasswordStrength(this.value)">
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password')">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-text" id="strengthText"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmer le mot de passe</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Répétez votre mot de passe" required>
          </div>
        </div>

        <div class="form-checkbox">
          <input type="checkbox" id="terms" required>
          <label for="terms">J'accepte les <a href="#" onclick="return false">conditions d'utilisation</a> et la <a href="#" onclick="return false">politique de confidentialité</a></label>
        </div>

        <button type="submit" class="btn-auth" id="registerBtn">
          <span class="btn-text">Créer mon compte</span>
          <span class="btn-loader hidden">
            <span class="spinner-sm"></span> Création...
          </span>
        </button>
      </form>

      <p class="auth-switch">
        Déjà un compte ?
        <a href="/login">Se connecter →</a>
      </p>

      <a href="/" class="btn-back-home">← Retour à l'accueil</a>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    function togglePasswordVisibility(inputId) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function checkPasswordStrength(password) {
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');
      if (!password) {
        fill.style.width = '0';
        text.textContent = '';
        return;
      }

      let strength = 0;
      if (password.length >= 6) strength++;
      if (password.length >= 10) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^A-Za-z0-9]/.test(password)) strength++;

      const levels = [
        { label: '', color: '', width: '0%' },
        { label: 'Très faible', color: '#ef4444', width: '20%' },
        { label: 'Faible', color: '#f97316', width: '40%' },
        { label: 'Moyen', color: '#eab308', width: '60%' },
        { label: 'Fort', color: '#22c55e', width: '80%' },
        { label: 'Très fort', color: '#16a34a', width: '100%' }
      ];

      const level = levels[Math.min(strength, 5)];
      fill.style.width = level.width;
      fill.style.background = level.color;
      text.textContent = level.label;
      text.style.color = level.color;
    }

    async function handleRegister(e) {
      e.preventDefault();
      const alertBox = document.getElementById('alertBox');
      const btn = document.getElementById('registerBtn');

      // Validate passwords match
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        alertBox.textContent = 'Les mots de passe ne correspondent pas.';
        alertBox.classList.remove('hidden');
        alertBox.className = 'alert-box alert-error';
        return;
      }

      const phone = document.getElementById('phone').value.trim();
      if (phone) {
        const cleaned = phone.replace(/[\s\-\(\)\.]/g, '');
        const normalized = cleaned.startsWith('00225') ? '+' + cleaned.slice(2)
          : cleaned.startsWith('+225') ? cleaned
          : cleaned.startsWith('225') ? '+' + cleaned
          : '+225' + cleaned;
        if (!/^\+225\d{10}$/.test(normalized)) {
          alertBox.textContent = 'Numéro de téléphone invalide. Format attendu : 07 XX XX XX XX (10 chiffres).';
          alertBox.classList.remove('hidden');
          alertBox.className = 'alert-box alert-error';
          return;
        }
      }

      alertBox.classList.add('hidden');
      btn.querySelector('.btn-text').classList.add('hidden');
      btn.querySelector('.btn-loader').classList.remove('hidden');
      btn.disabled = true;

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Erreur lors de la création du compte');
        }

        alertBox.textContent = '✅ Compte créé ! Vérifiez votre email pour activer votre compte.';
        alertBox.className = 'alert-box alert-success';
        alertBox.classList.remove('hidden');
        document.getElementById('registerForm').style.display = 'none';
      } catch (err) {
        alertBox.textContent = err.message;
        alertBox.className = 'alert-box alert-error';
        alertBox.classList.remove('hidden');
      } finally {
        btn.querySelector('.btn-text').classList.remove('hidden');
        btn.querySelector('.btn-loader').classList.add('hidden');
        btn.disabled = false;
      }
    }

    // Redirect if already logged in
    window.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      if (token) window.location.href = '/dashboard';
    });
  </script>
</body>
</html>
