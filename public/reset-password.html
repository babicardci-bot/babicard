<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — Babicard.ci</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <button class="theme-toggle theme-toggle-float" id="themeToggle" onclick="toggleTheme()" title="Mode clair / sombre">
    <div class="theme-toggle-knob" id="themeKnob">🌙</div>
  </button>

  <div class="auth-bg">
    <div class="auth-particles"></div>
    <div class="floating-icons">
      <span class="float-icon" style="top:10%;left:8%;animation-delay:0s">🎮</span>
      <span class="float-icon" style="top:20%;right:10%;animation-delay:1s">🍎</span>
      <span class="float-icon" style="top:60%;left:5%;animation-delay:2s">🎯</span>
      <span class="float-icon" style="top:70%;right:8%;animation-delay:0.5s">🎬</span>
    </div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/">
          <span class="logo-icon">🎮</span>
          <span class="logo-text">Babicard<span class="logo-accent">.ci</span></span>
        </a>
      </div>

      <h1 class="auth-title">Nouveau mot de passe</h1>
      <p class="auth-subtitle">Choisissez un nouveau mot de passe sécurisé</p>

      <div class="alert-box hidden" id="alertBox"></div>

      <div id="invalidToken" class="hidden" style="text-align:center;padding:20px;">
        <div style="font-size:48px;margin-bottom:12px;">⚠️</div>
        <p style="color:var(--text-secondary);">Ce lien est invalide ou a expiré.</p>
        <a href="/forgot-password" class="btn-auth" style="display:inline-block;margin-top:16px;text-decoration:none;">Nouvelle demande</a>
      </div>

      <form class="auth-form" id="resetForm" onsubmit="handleReset(event)">
        <div class="form-group">
          <label for="newPassword">Nouveau mot de passe</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <input type="password" id="newPassword" placeholder="Minimum 6 caractères" required>
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('newPassword')">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmer le mot de passe</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <input type="password" id="confirmPassword" placeholder="Répéter le mot de passe" required>
          </div>
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">
          <span class="btn-text">🔒 Réinitialiser le mot de passe</span>
          <span class="btn-loader hidden">
            <span class="spinner-sm"></span> Enregistrement...
          </span>
        </button>
      </form>

      <p class="auth-switch" style="margin-top:20px;">
        <a href="/login">← Retour à la connexion</a>
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('resetForm').classList.add('hidden');
      document.getElementById('invalidToken').classList.remove('hidden');
    }

    function togglePasswordVisibility(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    async function handleReset(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const btnText = btn.querySelector('.btn-text');
      const btnLoader = btn.querySelector('.btn-loader');
      const alertBox = document.getElementById('alertBox');

      const newPwd = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (newPwd !== confirm) {
        alertBox.textContent = 'Les mots de passe ne correspondent pas.';
        alertBox.classList.remove('hidden');
        alertBox.classList.add('alert-error');
        return;
      }

      alertBox.classList.add('hidden');
      btnText.classList.add('hidden');
      btnLoader.classList.remove('hidden');
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: newPwd })
        });
        const data = await res.json();
        if (res.ok) {
          alertBox.textContent = data.message + ' Redirection...';
          alertBox.className = 'alert-box alert-success';
          alertBox.classList.remove('hidden');
          document.getElementById('resetForm').style.display = 'none';
          setTimeout(() => window.location.href = '/login', 2500);
        } else {
          throw new Error(data.error || 'Erreur');
        }
      } catch (err) {
        alertBox.textContent = err.message;
        alertBox.classList.remove('hidden');
        alertBox.classList.add('alert-error');
        if (err.message.includes('invalide') || err.message.includes('expiré')) {
          document.getElementById('resetForm').classList.add('hidden');
          document.getElementById('invalidToken').classList.remove('hidden');
        }
      } finally {
        btnText.classList.remove('hidden');
        btnLoader.classList.add('hidden');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
