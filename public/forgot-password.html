<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6C63FF">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Babicard">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Mot de passe oublié — Babicard.ci</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <button class="theme-toggle theme-toggle-float" id="themeToggle" onclick="toggleTheme()" title="Mode clair / sombre">
    <div class="theme-toggle-knob" id="themeKnob">🌙</div>
  </button>

  <div class="auth-bg">
    <div class="auth-particles"></div>
    <div class="floating-icons">
      <span class="float-icon" style="top:10%;left:8%;animation-delay:0s">🎮</span>
      <span class="float-icon" style="top:20%;right:10%;animation-delay:1s">🍎</span>
      <span class="float-icon" style="top:60%;left:5%;animation-delay:2s">🎯</span>
      <span class="float-icon" style="top:70%;right:8%;animation-delay:0.5s">🎬</span>
    </div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/">
          <span class="logo-icon">🎮</span>
          <span class="logo-text">Babicard<span class="logo-accent">.ci</span></span>
        </a>
      </div>

      <h1 class="auth-title">Mot de passe oublié</h1>
      <p class="auth-subtitle">Entrez votre email pour recevoir un lien de réinitialisation</p>

      <div class="alert-box hidden" id="alertBox"></div>
      <div class="alert-box alert-success hidden" id="successBox"></div>

      <form class="auth-form" id="forgotForm" onsubmit="handleForgot(event)">
        <div class="form-group">
          <label for="email">Adresse email</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
            <input type="email" id="email" name="email" placeholder="votre@email.com" required autocomplete="email">
          </div>
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">
          <span class="btn-text">Envoyer le lien</span>
          <span class="btn-loader hidden">
            <span class="spinner-sm"></span> Envoi...
          </span>
        </button>
      </form>

      <p class="auth-switch" style="margin-top:20px;">
        <a href="/login">← Retour à la connexion</a>
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    async function handleForgot(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const btnText = btn.querySelector('.btn-text');
      const btnLoader = btn.querySelector('.btn-loader');
      const alertBox = document.getElementById('alertBox');
      const successBox = document.getElementById('successBox');

      alertBox.classList.add('hidden');
      successBox.classList.add('hidden');
      btnText.classList.add('hidden');
      btnLoader.classList.remove('hidden');
      btn.disabled = true;

      const email = document.getElementById('email').value;

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (res.ok) {
          successBox.textContent = data.message;
          successBox.classList.remove('hidden');
          document.getElementById('forgotForm').style.display = 'none';
        } else {
          throw new Error(data.error || 'Erreur');
        }
      } catch (err) {
        alertBox.textContent = err.message;
        alertBox.classList.remove('hidden');
        alertBox.classList.add('alert-error');
      } finally {
        btnText.classList.remove('hidden');
        btnLoader.classList.add('hidden');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
