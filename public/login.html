<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6C63FF">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Babicard">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Connexion — Babicard.ci</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <!-- Bouton thème flottant -->
  <button class="theme-toggle theme-toggle-float" id="themeToggle" onclick="toggleTheme()" title="Mode clair / sombre">
    <div class="theme-toggle-knob" id="themeKnob">🌙</div>
  </button>

  <div class="auth-bg">
    <div class="auth-particles"></div>
    <div class="floating-icons">
      <span class="float-icon" style="top:10%;left:8%;animation-delay:0s">🎮</span>
      <span class="float-icon" style="top:20%;right:10%;animation-delay:1s">🍎</span>
      <span class="float-icon" style="top:60%;left:5%;animation-delay:2s">🎯</span>
      <span class="float-icon" style="top:70%;right:8%;animation-delay:0.5s">🎬</span>
      <span class="float-icon" style="top:40%;left:15%;animation-delay:1.5s">🖥️</span>
    </div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/">
          <span class="logo-icon">🎮</span>
          <span class="logo-text">Babicard<span class="logo-accent">.ci</span></span>
        </a>
      </div>

      <h1 class="auth-title">Bienvenue !</h1>
      <p class="auth-subtitle">Connectez-vous à votre compte</p>

      <div class="alert-box hidden" id="alertBox"></div>
      <div class="alert-box alert-success hidden" id="successBox"></div>

      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Adresse email</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
            <input type="email" id="email" name="email" placeholder="votre@email.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <input type="password" id="password" name="password" placeholder="Votre mot de passe" required autocomplete="current-password">
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password')">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>

        <!-- 2FA field — hidden by default, shown when server requires it -->
        <div class="form-group" id="twoFaGroup" style="display:none;">
          <label for="twoFaCode">🔐 Code 2FA (Google Authenticator)</label>
          <div class="input-wrapper">
            <input type="text" id="twoFaCode" name="two_fa_code" placeholder="000000" maxlength="6" autocomplete="one-time-code" inputmode="numeric" style="letter-spacing:6px;font-size:20px;text-align:center;">
          </div>
        </div>

        <div style="text-align:right;margin-top:-8px;margin-bottom:4px;">
          <a href="/forgot-password" style="font-size:13px;color:var(--primary);text-decoration:none;">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-auth" id="loginBtn">
          <span class="btn-text">Se connecter</span>
          <span class="btn-loader hidden">
            <span class="spinner-sm"></span> Connexion...
          </span>
        </button>
      </form>


      <p class="auth-switch">
        Pas encore de compte ?
        <a href="/register">Créer un compte gratuit →</a>
      </p>

      <a href="/" class="btn-back-home">← Retour à l'accueil</a>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    function togglePasswordVisibility(inputId) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const btnText = btn.querySelector('.btn-text');
      const btnLoader = btn.querySelector('.btn-loader');
      const alertBox = document.getElementById('alertBox');

      alertBox.classList.add('hidden');
      btnText.classList.add('hidden');
      btnLoader.classList.remove('hidden');
      btn.disabled = true;

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const twoFaCode = document.getElementById('twoFaCode').value.trim();

      try {
        const body = { email, password };
        if (twoFaCode) body.two_fa_code = twoFaCode;

        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await response.json();

        // 2FA required — show the code field
        if (response.ok && data.two_fa_required) {
          document.getElementById('twoFaGroup').style.display = 'block';
          document.getElementById('twoFaCode').focus();
          alertBox.textContent = '🔐 Entrez le code de votre application 2FA.';
          alertBox.classList.remove('hidden', 'alert-error');
          alertBox.classList.add('alert-success');
          return;
        }

        if (!response.ok) {
          if (data.email_not_verified) {
            alertBox.innerHTML = `${data.error} <br><a href="#" onclick="resendVerification('${email}')" style="color:inherit;font-weight:bold;text-decoration:underline;">Renvoyer l'email de vérification</a>`;
          } else {
            alertBox.textContent = data.error || 'Erreur de connexion';
          }
          alertBox.classList.remove('hidden');
          alertBox.classList.add('alert-error');
          return;
        }

        // Save token
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Redirect based on role
        const redirect = new URLSearchParams(window.location.search).get('redirect');
        if (data.user.role === 'admin') {
          window.location.href = redirect || '/admin';
        } else {
          window.location.href = redirect || '/dashboard';
        }
      } catch (err) {
        alertBox.textContent = err.message;
        alertBox.classList.remove('hidden');
        alertBox.classList.add('alert-error');
      } finally {
        btnText.classList.remove('hidden');
        btnLoader.classList.add('hidden');
        btn.disabled = false;
      }
    }

    async function resendVerification(email) {
      try {
        const res = await fetch('/api/auth/resend-verification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const successBox = document.getElementById('successBox');
        successBox.textContent = 'Email de vérification renvoyé ! Vérifiez votre boîte mail.';
        successBox.classList.remove('hidden');
        document.getElementById('alertBox').classList.add('hidden');
      } catch (e) {}
    }

    // Redirect if already logged in
    window.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if (token && user) {
        window.location.href = user.role === 'admin' ? '/admin' : '/dashboard';
      }

      // Show messages from URL params
      const params = new URLSearchParams(window.location.search);
      const successBox = document.getElementById('successBox');
      const alertBox = document.getElementById('alertBox');
      if (params.get('verified') === '1') {
        successBox.textContent = '✅ Email vérifié ! Vous pouvez maintenant vous connecter.';
        successBox.classList.remove('hidden');
      } else if (params.get('verify_expired') === '1') {
        alertBox.textContent = 'Ce lien de vérification a expiré. Connectez-vous pour en recevoir un nouveau.';
        alertBox.classList.remove('hidden');
        alertBox.classList.add('alert-error');
      } else if (params.get('verify_error') === '1') {
        alertBox.textContent = 'Lien de vérification invalide ou déjà utilisé.';
        alertBox.classList.remove('hidden');
        alertBox.classList.add('alert-error');
      }
    });
  </script>
</body>
</html>
